<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온라인 신청 - 상세</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a4fa0; --primary-light: #2563cc; --primary-dark: #0f3070;
    --accent: #e8f0fe; --text: #1a1a2e; --text-muted: #6b7280;
    --border: #dde3ef; --white: #ffffff; --bg: #f4f6fb;
    --shadow: 0 2px 12px rgba(26,79,160,0.10); --radius: 10px;
    --success: #16a34a; --danger: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--primary); color: white; padding: 0 24px;
    height: 60px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .back-btn {
    background: rgba(255,255,255,0.15); border: none; color: white;
    width: 34px; height: 34px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; transition: background 0.15s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.25); }
  .header-title { font-size: 17px; font-weight: 700; flex: 1; }
  .my-count-badge {
    background: rgba(255,255,255,0.2); padding: 4px 12px;
    border-radius: 20px; font-size: 13px;
  }

  .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

  .apply-header {
    background: white; border-radius: var(--radius);
    border: 1.5px solid var(--border); padding: 20px 24px;
    margin-bottom: 20px; box-shadow: var(--shadow);
    display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap;
  }
  .apply-header-info { flex: 1; min-width: 200px; }
  .apply-title { font-size: 19px; font-weight: 700; color: var(--primary-dark); margin-bottom: 4px; }
  .apply-period { font-size: 13px; color: var(--text-muted); }
  .apply-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-tag {
    background: var(--accent); color: var(--primary); font-size: 12px;
    font-weight: 600; padding: 3px 10px; border-radius: 12px;
  }

  /* Search */
  .search-row {
    background: white; border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px;
    display: flex; gap: 10px; margin-bottom: 16px; box-shadow: var(--shadow);
  }
  .search-row input {
    flex: 1; border: 1.5px solid var(--border); border-radius: 6px;
    padding: 9px 12px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; outline: none;
  }
  .search-row input:focus { border-color: var(--primary); }
  .search-row button {
    background: var(--primary); color: white; border: none;
    border-radius: 6px; padding: 8px 18px; font-size: 14px;
    font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  }

  /* Items */
  .items-table { background: white; border-radius: var(--radius); border: 1.5px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: #f0f4fb; padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--primary-dark); text-align: center; border-bottom: 1.5px solid var(--border); }
  tbody tr { border-bottom: 1px solid #eef0f6; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover:not(.full-row) { background: #f8faff; }
  td { padding: 13px 16px; font-size: 14px; vertical-align: middle; }
  td.item-name { font-weight: 500; }
  td.item-count { text-align: center; }
  td.item-action { text-align: center; }

  .capacity-bar {
    width: 80px; background: #e5e7eb; border-radius: 4px;
    height: 6px; margin: 4px auto 0; overflow: hidden;
  }
  .capacity-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .cap-ok { background: var(--success); }
  .cap-warn { background: #f59e0b; }
  .cap-full { background: var(--danger); }
  .count-text { font-size: 13px; }
  .count-text.full { color: var(--danger); font-weight: 600; }

  .apply-item-btn {
    background: var(--primary); color: white; border: none;
    border-radius: 6px; padding: 7px 14px; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s; min-width: 80px; width: auto;
    white-space: nowrap; text-align: center; display: inline-block;
    line-height: 1.4;
  }
  .apply-item-btn:hover { background: var(--primary-dark); }
  .apply-item-btn.full { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
  .apply-item-btn.applied { background: #dcfce7; color: var(--success); cursor: default; border: 1.5px solid #bbf7d0; }
  .apply-item-btn.waiting { background: #fef3c7; color: #92400e; cursor: not-allowed; border: 1.5px solid #fde68a; }

  .empty-state { padding: 60px; text-align: center; color: var(--text-muted); }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ======= QUEUE OVERLAY ======= */
  .queue-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(255,255,255,0.97); z-index: 2000;
    align-items: center; justify-content: center; flex-direction: column;
  }
  .queue-overlay.active { display: flex; }
  .queue-logo { font-size: 56px; margin-bottom: 20px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  .queue-title { font-size: 22px; font-weight: 700; color: var(--primary-dark); margin-bottom: 8px; text-align: center; }
  .queue-sub { font-size: 15px; color: var(--text-muted); margin-bottom: 36px; text-align: center; }
  
  .queue-progress-wrap { width: min(80vw, 360px); margin-bottom: 28px; }
  .queue-progress-bar { width: 100%; background: #e5e7eb; border-radius: 8px; height: 12px; overflow: hidden; margin-bottom: 10px; }
  .queue-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary-light), var(--primary)); border-radius: 8px; transition: width 1s ease; }
  .queue-percent { text-align: center; font-size: 20px; font-weight: 700; color: var(--primary); }

  .queue-stats { background: #f4f6fb; border-radius: 12px; padding: 18px 24px; width: min(80vw, 360px); margin-bottom: 32px; }
  .queue-stat { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .queue-stat:last-child { border-bottom: none; }
  .queue-stat-label { color: var(--text-muted); }
  .queue-stat-value { font-weight: 700; color: var(--primary); }

  .queue-notice {
    background: #fef3c7; border-radius: 8px; padding: 12px 16px;
    font-size: 13px; color: #92400e; width: min(80vw, 360px);
    margin-bottom: 24px; line-height: 1.6;
  }
  .queue-cancel-btn {
    background: #f3f4f6; color: var(--text); border: none; border-radius: 8px;
    padding: 11px 32px; font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* ======= PROCESSING OVERLAY ======= */
  .processing-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15, 23, 42, 0.55); z-index: 1900;
    align-items: center; justify-content: center;
  }
  .processing-overlay.active { display: flex; }
  .processing-card {
    background: white; border-radius: 20px; padding: 44px 48px;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25); min-width: 260px;
  }
  .processing-spinner {
    width: 52px; height: 52px;
    border: 4px solid #e5e7eb;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .processing-text {
    font-size: 16px; font-weight: 700; color: var(--primary-dark);
  }
  .processing-sub {
    font-size: 13px; color: var(--text-muted); margin-top: -8px;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1a1a2e; color: white; padding: 12px 24px; border-radius: 24px;
    font-size: 14px; font-weight: 500; z-index: 3000; transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #166534; }
  .toast.error { background: #991b1b; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1500; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: white; border-radius: 14px; padding: 32px 28px; width: 90%; max-width: 360px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: modalIn 0.2s ease; }
  @keyframes modalIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
  .modal-icon { font-size: 40px; margin-bottom: 12px; }
  .modal-msg { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  .modal-ok-btn { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 11px 32px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }

  @media (max-width: 600px) {
    thead th:nth-child(2), td:nth-child(2) { display: none; }
    .apply-header { padding: 14px 16px; }
  }
</style>
</head>
<body>

<header>
  <a class="back-btn" href="apply.html">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </a>
  <div class="header-title" id="headerTitle">온라인 신청</div>
  <div class="my-count-badge" id="myCountBadge">내 신청: 0/0</div>
</header>

<div class="container">
  <div class="apply-header">
    <div class="apply-header-info">
      <div class="apply-title" id="applyTitle">불러오는 중...</div>
      <div class="apply-period" id="applyPeriod"></div>
    </div>
    <div class="apply-meta" id="applyMeta"></div>
  </div>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="항목 검색 (예: 통계학)" oninput="filterItems()">
    <button onclick="filterItems()">검색</button>
  </div>

  <div class="items-table">
    <table>
      <thead>
        <tr>
          <th style="width:50px">번호</th>
          <th>항목명</th>
          <th style="width:120px">인원</th>
          <th style="width:90px">신청</th>
        </tr>
      </thead>
      <tbody id="itemsBody">
        <tr><td colspan="4"><div class="loading"><div class="spinner"></div>불러오는 중...</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Processing Overlay (신청 처리 중) -->
<div class="processing-overlay" id="processingOverlay">
  <div class="processing-card">
    <div class="processing-spinner"></div>
    <div class="processing-text">신청 처리 중...</div>
    <div class="processing-sub">잠시만 기다려 주세요</div>
  </div>
</div>

<!-- Queue Overlay -->
<div class="queue-overlay" id="queueOverlay">
  <div class="queue-logo">⏳</div>
  <div class="queue-title">신청 시스템 접속 대기중입니다.</div>
  <div class="queue-sub">잠시만 기다리시면 해당 페이지로 자동 접속됩니다.</div>

  <div class="queue-progress-wrap">
    <div class="queue-progress-bar">
      <div class="queue-progress-fill" id="queueProgressFill" style="width:0%"></div>
    </div>
    <div class="queue-percent" id="queuePercent">0% (0/0)</div>
  </div>

  <div class="queue-stats">
    <div class="queue-stat">
      <span class="queue-stat-label">본인 앞 대기자수</span>
      <span class="queue-stat-value" id="queueBefore">0명</span>
    </div>
    <div class="queue-stat">
      <span class="queue-stat-label">본인 뒤 대기자수</span>
      <span class="queue-stat-value" id="queueAfter">0명</span>
    </div>
    <div class="queue-stat">
      <span class="queue-stat-label">예상대기시간</span>
      <span class="queue-stat-value" id="queueTime">-</span>
    </div>
  </div>

  <div class="queue-notice">
    새로고침(F5)을 시도하시면 대기시간이 더 길어질 수 있습니다.<br>
    시스템 사정에 따라 실제 대기시간과 차이가 날 수 있습니다.
  </div>

  <button class="queue-cancel-btn" onclick="cancelQueue()">중지</button>
</div>

<!-- Alert Modal -->
<div class="modal-overlay" id="alertModal">
  <div class="modal">
    <div class="modal-icon" id="alertIcon">⚠️</div>
    <div class="modal-msg" id="alertMsg"></div>
    <div class="modal-sub" id="alertSub"></div>
    <button class="modal-ok-btn" onclick="closeAlert()">확인</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>



<script>
/* ============================================================
   설정
============================================================ */
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbz7ee4H9hEf-8Lm-g8utkqMdApOOcwBkyK0gmucsEoGFhLvNm9zeAALpIL8qRgvt--_cg/exec';
const GAS_READY = true;

const urlParams   = new URLSearchParams(window.location.search);
const applyId     = urlParams.get('id');
const currentUser = JSON.parse(sessionStorage.getItem('applyUser') || 'null');

if (!currentUser) { window.location.href = 'apply.html'; }

/* ============================================================
   상태
============================================================ */
let applyInfo     = null;
let allItems      = [];
let myApplied     = new Set();
let queueInterval = null;
let pendingItemId = null;
let queuePos      = 0;
let totalInQueue  = 0;

/* ============================================================
   기본 Mock (GAS 미연결 폴백)
============================================================ */
const DEFAULT_MOCK = {
  id: applyId,
  title: '2026 수강신청 (데모)',
  startDate:  '2026-02-21 15:00',
  endDate:    '2026-02-22 17:00',
  maxPerUser: 5,
  allowedGroups: ['1학년','2학년','3학년'],
  items: [
    { id:'A01', name:'통계학 A',    current:0,  max:25 },
    { id:'A02', name:'통계학 B',    current:23, max:25 },
    { id:'A03', name:'경제학 A',    current:25, max:25 },
    { id:'A04', name:'경제학 B',    current:12, max:30 },
    { id:'A05', name:'철학 개론',   current:5,  max:20 },
    { id:'A06', name:'문학과 사회', current:18, max:20 },
    { id:'A07', name:'물리학 실험', current:30, max:30 },
    { id:'A08', name:'화학 개론',   current:8,  max:25 }
  ]
};

/* ============================================================
   유틸
============================================================ */
function parseField(val) {
  if (Array.isArray(val)) return val;
  if (!val || typeof val !== 'string') return null;
  try { return JSON.parse(val); } catch { return null; }
}

async function gasCall(action, params = {}) {
  const body = new URLSearchParams({ action, ...params });
  const res  = await fetch(GAS_URL, {
    method:  'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body:    body.toString()
  });
  return await res.json();
}

/* GAS 응답에서 applyInfo 정규화 */
function normalizeApply(raw) {
  if (!raw || !raw.title) return null;
  const items         = parseField(raw.items)  || parseField(raw.items)  || [];
  const allowedGroups = parseField(raw.allowedGroups) || parseField(raw.groups) || [];
  return {
    ...raw,
    items,
    allowedGroups,
    maxPerUser: Number(raw.maxPerUser) || 1
  };
}

/* ============================================================
   초기화
============================================================ */
async function init() {

  /* ── 1) GAS 연결 시 직접 fetch */
  if (GAS_READY) {
    try {
      console.log('[apply-detail] GAS 요청:', applyId);
      const json = await gasCall('getApplyDetail', { id: applyId, userId: currentUser.id });
      console.log('[apply-detail] GAS 응답:', JSON.stringify(json).slice(0, 300));

      const normalized = normalizeApply(json.apply || json);
      if (normalized) {
        applyInfo = normalized;
        myApplied = new Set((json.myApplied || []).map(String));
        console.log('[apply-detail] GAS 데이터 사용:', applyInfo.title);
      } else {
        console.warn('[apply-detail] GAS 응답에 유효한 apply 없음:', json);
      }
    } catch (e) {
      console.error('[apply-detail] GAS fetch 실패:', e);
    }
  }

  /* ── 2) sessionStorage 캐시 (apply.html이 저장한 목록) */
  if (!applyInfo) {
    try {
      const raw  = sessionStorage.getItem('applyList');
      if (raw) {
        const list = JSON.parse(raw);
        const hit  = list.find(a => String(a.id) === String(applyId));
        console.log('[apply-detail] sessionStorage 캐시:', hit?.title);
        const normalized = normalizeApply(hit);
        if (normalized) applyInfo = normalized;
      }
    } catch (e) {}
  }

  /* ── 3) 폴백 → DEFAULT_MOCK */
  if (!applyInfo) {
    console.warn('[apply-detail] 폴백 → DEFAULT_MOCK 사용');
    applyInfo = DEFAULT_MOCK;
  }

  /* ── UI 렌더링 */
  document.getElementById('headerTitle').textContent = applyInfo.title;
  document.getElementById('applyTitle').textContent  = applyInfo.title;
  document.getElementById('applyPeriod').textContent =
    `신청 기간: ${applyInfo.startDate} ~ ${applyInfo.endDate}`;

  // 5분 전 입장 시 카운트다운 배너 표시
  startStatusWatcher();
  document.getElementById('applyMeta').innerHTML = `
    <span class="meta-tag">1인 최대 ${applyInfo.maxPerUser}개</span>
    <span class="meta-tag">${applyInfo.allowedGroups.join(', ') || '전체'}</span>
  `;

  allItems = Array.isArray(applyInfo.items) ? applyInfo.items : [];
  updateMyCount();
  renderItems(allItems);

  /* 5초 폴링 (GAS 연결 시에만) */
  if (GAS_READY) setInterval(refreshItems, 5000);
  /* 1초마다 상태 갱신 (신청 시작 시 버튼 자동 활성화) */
  setInterval(() => { filterItems(); updateStatusBanner(); }, 1000);
}

/* ============================================================
   신청 현황 배지
============================================================ */
function updateMyCount() {
  document.getElementById('myCountBadge').textContent =
    `내 신청: ${myApplied.size}/${applyInfo.maxPerUser}`;
}

/* ============================================================
   검색
============================================================ */
function filterItems() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  renderItems(kw ? allItems.filter(i => i.name.toLowerCase().includes(kw)) : allItems);
}

/* ============================================================
   항목 렌더링
============================================================ */
function getApplyStatus() {
  if (!applyInfo) return 'unknown';
  const now = new Date();
  const s   = new Date(applyInfo.startDate);
  const e   = new Date(applyInfo.endDate);
  const fiveMinBefore = new Date(s.getTime() - 5 * 60 * 1000);
  if (now >= s && now <= e)            return 'active';
  if (now >= fiveMinBefore && now < s) return 'soon';
  if (now < fiveMinBefore)             return 'upcoming';
  return 'ended';
}

function renderItems(items) {
  const body = document.getElementById('itemsBody');
  if (!items || !items.length) {
    body.innerHTML = '<tr><td colspan="4"><div class="empty-state">항목이 없습니다.</div></td></tr>';
    return;
  }

  const applyStatus = getApplyStatus();

  body.innerHTML = items.map((item, idx) => {
    const cur       = Number(item.current) || 0;
    const max       = Number(item.max)     || 0;
    const pct       = max > 0 ? cur / max : 0;
    const isFull    = cur >= max;
    const isApplied = myApplied.has(String(item.id));
    const capClass  = pct >= 1 ? 'cap-full' : pct >= 0.8 ? 'cap-warn' : 'cap-ok';

    let btnClass = 'apply-item-btn';
    let btnText  = '신청하기';
    let btnClick = `onclick="doApply('${item.id}')"`;

    if (isApplied) {
      btnClass = 'apply-item-btn applied'; btnText = '신청완료'; btnClick = '';
    } else if (isFull) {
      btnClass = 'apply-item-btn full'; btnText = '마감'; btnClick = '';
    } else if (applyStatus === 'soon') {
      // 5분 전 입장: 버튼은 대기 표시, 클릭 불가
      btnClass = 'apply-item-btn waiting'; btnText = '⏳ 대기중'; btnClick = '';
    } else if (applyStatus !== 'active') {
      btnClass = 'apply-item-btn full'; btnText = '신청불가'; btnClick = '';
    }

    return `<tr>
      <td style="text-align:center;color:var(--text-muted)">${idx+1}</td>
      <td class="item-name">${item.name}</td>
      <td class="item-count">
        <div class="count-text ${isFull?'full':''}">${cur}/${max}</div>
        <div class="capacity-bar">
          <div class="capacity-fill ${capClass}" style="width:${Math.min(pct*100,100)}%"></div>
        </div>
      </td>
      <td class="item-action"><button class="${btnClass}" ${btnClick}>${btnText}</button></td>
    </tr>`;
  }).join('');
}

/* ============================================================
   폴링
============================================================ */
async function refreshItems() {
  if (!GAS_READY) return;
  try {
    const data = await gasCall('getItemCounts', { applyId, userId: currentUser.id });
    if (data && data.items) {
      allItems  = data.items;
      myApplied = new Set((data.myApplied || []).map(String));
      updateMyCount();
      filterItems();
    }
  } catch (e) {}
}

/* ============================================================
   신청
============================================================ */
async function doApply(itemId) {
  if (myApplied.size >= applyInfo.maxPerUser) {
    showAlert('⚠️', '신청 한도 초과', `최대 ${applyInfo.maxPerUser}개까지 신청 가능합니다.`);
    return;
  }

  // 신청 버튼 누를 때마다 항상 대기열 표시
  pendingItemId = itemId;

  let activeUsers = 0;
  if (GAS_READY) {
    try {
      const d = await gasCall('getActiveUsers', { applyId });
      activeUsers = d.count || 0;
    } catch (e) {}
  } else {
    activeUsers = 0; // 데모 모드는 대기없이 바로 처리
  }

  startQueue(Math.max(activeUsers, 1)); // 최소 1로 대기열 항상 표시
}

async function submitApply(itemId) {
  if (GAS_READY) {
    try {
      const data = await gasCall('applyItem', { applyId, itemId, userId: currentUser.id });
      if (data.success) {
        myApplied.add(String(itemId));
        updateMyCount();
        allItems = allItems.map(i => String(i.id) === String(itemId)
          ? { ...i, current: Number(i.current) + 1 } : i);
        filterItems();
        showToast('✓ 신청이 완료되었습니다.', 'success');
      } else if (data.error === 'FULL') {
        showAlert('🚫', '이미 정원이 찬 항목입니다', '다른 항목을 선택해 주세요.');
      } else if (data.error === 'ALREADY') {
        showAlert('ℹ️', '이미 신청한 항목입니다', '');
      } else {
        showAlert('❌', '신청에 실패했습니다', data.message || '잠시 후 다시 시도해 주세요.');
      }
      return;
    } catch (e) {
      console.warn('GAS 신청 실패:', e);
    }
  }

  /* 데모 모드 */
  const item = Array.isArray(allItems) ? allItems.find(i => String(i.id) === String(itemId)) : null;
  if (item && Number(item.current) >= Number(item.max)) {
    showAlert('🚫', '이미 정원이 찬 항목입니다', '다른 항목을 선택해 주세요.');
    return;
  }
  myApplied.add(String(itemId));
  updateMyCount();
  allItems = allItems.map(i => String(i.id) === String(itemId)
    ? { ...i, current: Number(i.current) + 1 } : i);
  filterItems();
  showToast('✓ 신청이 완료되었습니다. (데모)', 'success');
}

/* ============================================================
   대기열
============================================================ */
function startQueue(userCount) {
  queuePos     = userCount;
  totalInQueue = userCount + 1;
  document.getElementById('queueOverlay').classList.add('active');
  updateQueueUI();

  queueInterval = setInterval(async () => {
    if (GAS_READY) {
      try {
        const data = await gasCall('checkQueue', { applyId, userId: currentUser.id });
        if (data.canProceed) { clearQueue(); submitApply(pendingItemId); pendingItemId = null; return; }
        queuePos     = data.position ?? Math.max(0, queuePos - 1);
        totalInQueue = data.total    ?? totalInQueue;
      } catch (e) { queuePos = Math.max(0, queuePos - 1); }
    } else {
      // 데모 모드: 1초 후 바로 처리
      clearQueue(); submitApply(pendingItemId); pendingItemId = null; return;
    }
    if (queuePos <= 0) { clearQueue(); submitApply(pendingItemId); pendingItemId = null; return; }
    updateQueueUI();
  }, 1000);
}

function showProcessingOverlay() {
  document.getElementById('processingOverlay').classList.add('active');
}
function hideProcessingOverlay() {
  document.getElementById('processingOverlay').classList.remove('active');
}

function clearQueue() {
  clearInterval(queueInterval);
  document.getElementById('queueOverlay').classList.remove('active');
}
function cancelQueue() { clearQueue(); pendingItemId = null; }

function updateQueueUI() {
  const pct     = totalInQueue > 0 ? Math.round(((totalInQueue - queuePos) / totalInQueue) * 100) : 0;
  const waitSec = queuePos * 2;
  const waitStr = waitSec >= 60 ? `${Math.floor(waitSec/60)}분 ${waitSec%60}초` : `${waitSec}초`;
  document.getElementById('queueProgressFill').style.width = pct + '%';
  document.getElementById('queuePercent').textContent = `${pct}% (${totalInQueue-queuePos}/${totalInQueue})`;
  document.getElementById('queueBefore').textContent  = `${queuePos}명`;
  document.getElementById('queueAfter').textContent   = `${Math.max(0, Math.floor(Math.random()*3))}명`;
  document.getElementById('queueTime').textContent    = waitStr;
}

/* ============================================================
   UI 유틸
============================================================ */
function startStatusWatcher() {
  updateStatusBanner();
}

function updateStatusBanner() {
  const status = getApplyStatus();
  let banner = document.getElementById('statusBanner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'statusBanner';
    banner.style.cssText = `
      position: sticky; top: 60px; z-index: 100; padding: 10px 20px;
      font-size: 14px; font-weight: 600; text-align: center;
      display: none;
    `;
    document.querySelector('.container')?.prepend(banner);
  }

  if (status === 'soon') {
    const s        = new Date(applyInfo.startDate);
    const diffSec  = Math.max(0, Math.ceil((s - new Date()) / 1000));
    const min      = Math.floor(diffSec / 60);
    const sec      = diffSec % 60;
    const timeStr  = min > 0 ? `${min}분 ${String(sec).padStart(2,'0')}초` : `${sec}초`;
    banner.style.display   = 'block';
    banner.style.background = '#dbeafe';
    banner.style.color      = '#1e40af';
    banner.style.borderBottom = '2px solid #93c5fd';
    banner.innerHTML = `⏰ 신청 시작까지 <strong>${timeStr}</strong> 남았습니다. 신청은 시작 시각부터 가능합니다.`;
  } else if (status === 'active') {
    banner.style.display   = 'block';
    banner.style.background = '#dcfce7';
    banner.style.color      = '#166534';
    banner.style.borderBottom = '2px solid #86efac';
    banner.innerHTML = '✅ 신청이 시작되었습니다!';
    setTimeout(() => { banner.style.display = 'none'; }, 4000);
  } else {
    banner.style.display = 'none';
  }
}

function showAlert(icon, msg, sub) {
  document.getElementById('alertIcon').textContent = icon;
  document.getElementById('alertMsg').textContent  = msg;
  document.getElementById('alertSub').textContent  = sub || '';
  document.getElementById('alertModal').classList.add('active');
}
function closeAlert() { document.getElementById('alertModal').classList.remove('active'); }
document.getElementById('alertModal').addEventListener('click', function(e) {
  if (e.target === this) closeAlert();
});

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

/* ============================================================
   실행
============================================================ */
init();
</script>
</body>
