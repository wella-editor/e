<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모던 UI 버튼</title>
<style>
  /* 기본 리셋 및 배경 설정 */
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    /* 연한 민트와 하늘색이 섞인 밝은 그라데이션 배경 */
    background: linear-gradient(135deg, #e0f7fa, #e8f5e9);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', sans-serif;
  }

  /* 콘텐츠를 담는 모던한 카드 컨테이너 */
  .card-container {
    background: rgba(255, 255, 255, 0.9);
    padding: 40px 60px;
    border-radius: 24px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    backdrop-filter: blur(10px);
  }

  /* 텍스트 그룹 스타일링 */
  .text-group {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: 2px;
  }

  /* 개별 텍스트 컬러 지정 */
  .txt-yellow { color: #f6d860; } /* 화이트 배경에 맞춘 약간 짙은 연노랑 */
  .txt-black { color: #2c3e50; }  /* 너무 진하지 않은 부드러운 블랙/네이비 */
  .txt-blue { color: #64b5f6; }   /* 산뜻한 하늘색 */

  /* 둥근 그림자 버튼 스타일링 */
  .action-btn {
    background-color: #ffffff;
    color: #333333;
    text-decoration: none;
    padding: 16px 32px;
    border-radius: 50px; /* 둥근 버튼 */
    font-weight: 700;
    font-size: 1.1rem;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08); /* 부드러운 그림자 */
    border: 1px solid #f0f0f0;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
  }

  /* 버튼 호버 액션 (마우스 올렸을 때) */
  .action-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
  }

  /* 화살표에 민트색 포인트 */
  .arrow-icon {
    color: #4db6ac; 
    font-weight: 900;
    transition: transform 0.3s ease;
  }

  .action-btn:hover .arrow-icon {
    transform: translateX(4px);
  }
</style>
</head>
<body>

  <div class="card-container">
    <div class="text-group">
      <span class="txt-yellow">2026</span>
      <span class="txt-black">[</span><span class="txt-blue">3-4</span><span class="txt-black">]</span>
    </div>
    
    <a href="/presentation" class="action-btn">
      <span>서비스 이용하기</span>
      <span class="arrow-icon">&rarr;</span>
    </a>
  </div>

</body>
</html>
