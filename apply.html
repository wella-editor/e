<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온라인 신청</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a4fa0; --primary-light: #2563cc; --primary-dark: #0f3070;
    --accent: #e8f0fe; --text: #1a1a2e; --text-muted: #6b7280;
    --border: #dde3ef; --white: #ffffff; --bg: #f4f6fb;
    --shadow: 0 2px 12px rgba(26,79,160,0.10); --radius: 10px;
    --success: #16a34a; --danger: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--primary); color: white; padding: 0 24px;
    height: 60px; display: flex; align-items: center; gap: 16px;
  }
  .back-btn {
    background: rgba(255,255,255,0.15); border: none; color: white;
    width: 34px; height: 34px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; transition: background 0.15s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.25); }
  .header-title { font-size: 17px; font-weight: 700; flex: 1; }
  .header-user { font-size: 13px; opacity: 0.85; }
  .logout-btn {
    background: rgba(255,255,255,0.15); border: none; color: white;
    padding: 5px 12px; border-radius: 6px; font-size: 12px;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  }

  .container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }

  /* Auth Section */
  #authSection {
    max-width: 420px; margin: 60px auto;
    background: white; border-radius: 14px;
    border: 1.5px solid var(--border); padding: 40px 36px;
    box-shadow: var(--shadow);
  }
  .auth-logo { text-align: center; font-size: 48px; margin-bottom: 16px; }
  .auth-title { text-align: center; font-size: 22px; font-weight: 700; color: var(--primary-dark); margin-bottom: 6px; }
  .auth-sub { text-align: center; font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
  
  .auth-tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid var(--border); }
  .auth-tab {
    flex: 1; padding: 10px; text-align: center; font-size: 15px;
    font-weight: 600; cursor: pointer; color: var(--text-muted);
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    transition: all 0.15s;
  }
  .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  .auth-form { display: flex; flex-direction: column; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
  .form-input {
    border: 1.5px solid var(--border); border-radius: 8px; padding: 11px 14px;
    font-size: 15px; font-family: 'Noto Sans KR', sans-serif;
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--primary); }
  .form-select {
    border: 1.5px solid var(--border); border-radius: 8px; padding: 11px 14px;
    font-size: 15px; font-family: 'Noto Sans KR', sans-serif;
    outline: none; background: white; cursor: pointer;
  }
  .auth-btn {
    width: 100%; background: var(--primary); color: white;
    border: none; border-radius: 8px; padding: 13px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; margin-top: 8px;
    transition: background 0.15s;
  }
  .auth-btn:hover { background: var(--primary-dark); }
  .auth-error { color: #dc2626; font-size: 13px; text-align: center; min-height: 20px; }

  /* List Section */
  #listSection { display: none; }
  .user-info-bar {
    background: white; border-radius: var(--radius);
    border: 1.5px solid var(--border); padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px; box-shadow: var(--shadow);
  }
  .user-avatar {
    width: 40px; height: 40px; background: var(--accent);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .user-details { flex: 1; }
  .user-name { font-size: 15px; font-weight: 700; }
  .user-group { font-size: 13px; color: var(--text-muted); }

  /* Table */
  .search-bar {
    background: white; border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    display: flex; gap: 12px; align-items: center;
    margin-bottom: 20px; box-shadow: var(--shadow); flex-wrap: wrap;
  }
  .search-bar input[type="date"] {
    border: 1.5px solid var(--border); border-radius: 6px;
    padding: 7px 10px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; outline: none; color: var(--text);
  }
  .search-bar input[type="text"] {
    flex: 1; min-width: 160px; border: 1.5px solid var(--border);
    border-radius: 6px; padding: 8px 12px; font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif; outline: none;
  }
  .date-separator { font-size: 14px; color: var(--text-muted); }
  .search-btn {
    background: var(--primary); color: white; border: none;
    border-radius: 6px; padding: 8px 18px; font-size: 14px;
    font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
  }
  .info-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; color: var(--text-muted); }
  .table-wrap { background: white; border-radius: var(--radius); border: 1.5px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: #f0f4fb; padding: 13px 16px; font-size: 13px; font-weight: 600; color: var(--primary-dark); text-align: center; border-bottom: 1.5px solid var(--border); }
  tbody tr { border-bottom: 1px solid #eef0f6; transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8faff; }
  td { padding: 14px 16px; font-size: 14px; text-align: center; vertical-align: middle; }
  td.title { text-align: left; font-weight: 500; }
  td.period { font-size: 13px; color: var(--text-muted); }
  .status-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; margin-left: 6px; }
  .status-active { background: #dcfce7; color: var(--success); }
  .status-upcoming { background: #fef3c7; color: #d97706; }
  .status-soon { background: #dbeafe; color: var(--primary); }
  .status-ended { background: #f3f4f6; color: #9ca3af; }

  .apply-btn {
    background: var(--primary); color: white; border: none;
    border-radius: 6px; padding: 7px 16px; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s;
  }
  .apply-btn:hover { background: var(--primary-dark); }
  .apply-btn.disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
  .apply-btn.soon { background: #3b82f6; }
  .apply-btn.soon:hover { background: #2563eb; }

  .empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); font-size: 15px; }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: white; border-radius: 14px; padding: 32px 28px; width: 90%; max-width: 360px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: modalIn 0.2s ease; }
  @keyframes modalIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
  .modal-icon { font-size: 40px; margin-bottom: 12px; }
  .modal-msg { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  .modal-ok-btn { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 11px 32px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
</style>
</head>
<body>

<header>
  <a class="back-btn" href="index.html">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </a>
  <div class="header-title">온라인 신청</div>
  <span class="header-user" id="headerUser" style="display:none"></span>
  <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logout()">로그아웃</button>
</header>

<!-- Auth Section -->
<div id="authSection">
  <div class="auth-logo">📝</div>
  <div class="auth-title">온라인 신청</div>
  <div class="auth-sub">로그인 또는 회원가입이 필요합니다</div>
  
  <div class="auth-tabs">
    <div class="auth-tab active" onclick="switchTab('login')">로그인</div>
    <div class="auth-tab" onclick="switchTab('register')">회원가입</div>
  </div>

  <!-- Login Form -->
  <div id="loginForm" class="auth-form">
    <div class="form-group">
      <label class="form-label">아이디</label>
      <input class="form-input" type="text" id="loginId" placeholder="아이디 입력" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input class="form-input" type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>
    <div class="auth-error" id="loginError"></div>
    <button class="auth-btn" onclick="doLogin()">로그인</button>
  </div>

  <!-- Register Form -->
  <div id="registerForm" class="auth-form" style="display:none">
    <div class="form-group">
      <label class="form-label">이름</label>
      <input class="form-input" type="text" id="regName" placeholder="이름 입력">
    </div>
    <div class="form-group">
      <label class="form-label">아이디</label>
      <input class="form-input" type="text" id="regId" placeholder="아이디 입력 (영문, 숫자)">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input class="form-input" type="password" id="regPw" placeholder="비밀번호 입력">
    </div>
    <div class="form-group">
      <label class="form-label">학년 (그룹)</label>
      <select class="form-select" id="regGroup">
        <option value="">선택하세요</option>
        <option value="1학년">1학년</option>
        <option value="2학년">2학년</option>
        <option value="3학년">3학년</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">학번</label>
      <input class="form-input" type="text" id="regStudentId" placeholder="학번 입력">
    </div>
    <div class="auth-error" id="regError"></div>
    <button class="auth-btn" onclick="doRegister()">회원가입</button>
  </div>
</div>

<!-- List Section -->
<div id="listSection">
  <div class="container">
    <div class="user-info-bar">
      <div class="user-avatar">👤</div>
      <div class="user-details">
        <div class="user-name" id="userName"></div>
        <div class="user-group" id="userGroup"></div>
      </div>
    </div>

    <div class="search-bar">
      <input type="date" id="startDate">
      <span class="date-separator">~</span>
      <input type="date" id="endDate">
      <input type="text" id="searchKeyword" placeholder="신청 제목 검색">
      <button class="search-btn" onclick="loadApplyList()">🔍 검색</button>
    </div>

    <div class="info-bar">
      <span>Total <strong id="totalCount">0</strong>건</span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:50px">번호</th>
            <th>신청목록</th>
            <th>신청기간</th>
            <th style="width:80px">관리</th>
          </tr>
        </thead>
        <tbody id="applyBody">
          <tr><td colspan="4"><div class="loading"><div class="spinner"></div>불러오는 중...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Alert Modal -->
<div class="modal-overlay" id="alertModal">
  <div class="modal">
    <div class="modal-icon" id="alertIcon">⚠️</div>
    <div class="modal-msg" id="alertMsg"></div>
    <div class="modal-sub" id="alertSub"></div>
    <button class="modal-ok-btn" onclick="closeAlert()">확인</button>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbytw_fPkzxAjbz-S0kQ-TePZmDe2optYw1kalpsXjw-yF-2WxNsGufmeg5o9qbYOfQA9g/exec';
let currentUser = null;

// Init
function init() {
  const saved = sessionStorage.getItem('applyUser');
  if (saved) {
    currentUser = JSON.parse(saved);
    showListSection();
  }
}

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0)===(tab==='login')));
  document.getElementById('loginForm').style.display = tab === 'login' ? 'flex' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'flex' : 'none';
}

async function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  if (!id || !pw) { document.getElementById('loginError').textContent = '아이디와 비밀번호를 입력하세요.'; return; }
  
  try {
    const p = new URLSearchParams({ action: 'login', userId: id, password: pw });
    const res = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: p.toString() });
    const data = await res.json();
    if (data.success) {
      currentUser = data.user;
      sessionStorage.setItem('applyUser', JSON.stringify(currentUser));
      showListSection();
    } else {
      document.getElementById('loginError').textContent = data.message || '로그인에 실패했습니다.';
    }
  } catch(e) {
    // Demo login
    if (id === 'demo' && pw === '1234') {
      currentUser = { id: 'demo', name: '홍길동', group: '1학년', studentId: '2601001' };
      sessionStorage.setItem('applyUser', JSON.stringify(currentUser));
      showListSection();
    } else {
      document.getElementById('loginError').textContent = '아이디 또는 비밀번호가 올바르지 않습니다. (데모: demo / 1234)';
    }
  }
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const id = document.getElementById('regId').value.trim();
  const pw = document.getElementById('regPw').value;
  const group = document.getElementById('regGroup').value;
  const studentId = document.getElementById('regStudentId').value.trim();

  if (!name || !id || !pw || !group || !studentId) {
    document.getElementById('regError').textContent = '모든 항목을 입력해 주세요.'; return;
  }

  try {
    const p = new URLSearchParams({ action: 'register', name, userId: id, password: pw, group, studentId });
    const res = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: p.toString() });
    const data = await res.json();
    if (data.success) {
      showAlert('✅', '회원가입 완료', '로그인 탭에서 로그인해 주세요.');
      switchTab('login');
    } else {
      document.getElementById('regError').textContent = data.message || '회원가입에 실패했습니다.';
    }
  } catch(e) {
    document.getElementById('regError').textContent = '서버 연결 오류. GAS URL을 설정해 주세요.';
  }
}

function showListSection() {
  document.getElementById('authSection').style.display = 'none';
  document.getElementById('listSection').style.display = 'block';
  document.getElementById('headerUser').style.display = 'inline';
  document.getElementById('logoutBtn').style.display = 'inline';
  document.getElementById('headerUser').textContent = currentUser.name;
  document.getElementById('userName').textContent = `${currentUser.name} (${currentUser.studentId || currentUser.id})`;
  document.getElementById('userGroup').textContent = currentUser.group;

  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  document.getElementById('startDate').value = `${y}-${m}-01`;
  document.getElementById('endDate').value = `${y}-${m}-${String(new Date(y,now.getMonth()+1,0).getDate()).padStart(2,'0')}`;

  loadApplyList();
}

function logout() {
  sessionStorage.removeItem('applyUser');
  currentUser = null;
  document.getElementById('authSection').style.display = 'block';
  document.getElementById('listSection').style.display = 'none';
  document.getElementById('headerUser').style.display = 'none';
  document.getElementById('logoutBtn').style.display = 'none';
}

async function loadApplyList() {
  const body = document.getElementById('applyBody');
  body.innerHTML = '<tr><td colspan="4"><div class="loading"><div class="spinner"></div>불러오는 중...</div></td></tr>';

  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;
  const kw = document.getElementById('searchKeyword').value;

  try {
    const p = new URLSearchParams({ action: 'getApplyList', startDate: start, endDate: end, keyword: kw, userGroup: currentUser.group });
    const res = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: p.toString() });
    const data = await res.json();
    renderApplyTable(data.items || []);
  } catch(e) {
    renderApplyTable(getMockApplyData());
  }
}

function getMockApplyData() {
  return [
    { id: 1, title: '2026 수강신청', startDate: '2026-02-21 15:00', endDate: '2026-02-22 17:00', allowedGroups: ['1학년','2학년','3학년'], maxPerUser: 5 },
    { id: 2, title: '2026 동아리 신청', startDate: '2026-02-25 15:00', endDate: '2026-02-27 17:00', allowedGroups: ['1학년','2학년'], maxPerUser: 1 },
  ];
}

function getStatus(startDate, endDate) {
  const now = new Date();
  const s = new Date(startDate);
  const e = new Date(endDate);
  const fiveMinBefore = new Date(s.getTime() - 5 * 60 * 1000);
  if (now >= s && now <= e) return 'active';
  if (now >= fiveMinBefore && now < s) return 'soon';
  if (now < s) return 'upcoming';
  return 'ended';
}

function renderApplyTable(items) {
  const body = document.getElementById('applyBody');
  document.getElementById('totalCount').textContent = items.length;

  if (!items.length) {
    body.innerHTML = '<tr><td colspan="4"><div class="empty-state">조회가능한 신청이 없습니다.</div></td></tr>';
    return;
  }

  body.innerHTML = items.map((item, idx) => {
    const status = getStatus(item.startDate, item.endDate);
    const isAllowed = !item.allowedGroups || item.allowedGroups.includes(currentUser.group);
    
    const statusLabel = status === 'active' ? '<span class="status-badge status-active">진행중</span>' :
                        status === 'soon' ? '<span class="status-badge status-soon">5분 전</span>' :
                        status === 'upcoming' ? '<span class="status-badge status-upcoming">예정</span>' :
                        '<span class="status-badge status-ended">종료</span>';

    let btnClass = 'apply-btn disabled';
    let btnClick = `onclick="showAlert('⚠️', '신청 기간이 아닙니다', '신청 기간: ${item.startDate} ~ ${item.endDate}')"`;
    
    if ((status === 'active' || status === 'soon') && isAllowed) {
      btnClass = status === 'soon' ? 'apply-btn soon' : 'apply-btn';
      btnClick = `onclick="goApply(${item.id})"`;
    } else if (!isAllowed && (status === 'active' || status === 'soon')) {
      btnClick = `onclick="showAlert('🚫', '신청 권한이 없습니다', '이 신청은 ${item.allowedGroups?.join(', ')} 대상입니다')"`;
      btnClass = 'apply-btn disabled';
    }

    return `<tr>
      <td>${idx+1}</td>
      <td class="title">${item.title}${statusLabel}</td>
      <td class="period">${item.startDate} ~ ${item.endDate}</td>
      <td><button class="${btnClass}" ${btnClick}>신청</button></td>
    </tr>`;
  }).join('');
}

function goApply(id) {
  window.location.href = `apply-detail.html?id=${id}`;
}

function showAlert(icon, msg, sub) {
  document.getElementById('alertIcon').textContent = icon || '⚠️';
  document.getElementById('alertMsg').textContent = msg;
  document.getElementById('alertSub').textContent = sub || '';
  document.getElementById('alertModal').classList.add('active');
}
function closeAlert() { document.getElementById('alertModal').classList.remove('active'); }
document.getElementById('alertModal').addEventListener('click', function(e) { if(e.target===this) closeAlert(); });

document.getElementById('loginPw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

init();
</script>
</body>
</html>
